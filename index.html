          { id: 'stress_down', num: '2', label: '💬 対人関係、日々の付き合い、家庭や職場でもやもやしている', nextAroma: 'bergamot', reply: '人間関係は、相手の些細な言動でずっともやもやが残ってしまいますよね。' },

          { id: 'anxiety_tense', num: '2', label: '🎤 大切なプレゼン、商談、発表などの緊張する本番を控えている', nextAroma: 'lavender', reply: '本番への緊張ですね。失敗したらどうしよう、とドキドキして心拍数が上がっちゃいますよね。' },
          { id: 'anxiety_confidence', num: '3', label: '😢 誰かと比べて自分には得意なことも何もない気がして、自信がない', nextAroma: 'rose', reply: '自信をなくしてしまっているのですね。大丈夫、あなたにはあなただけの素晴らしいペースと価値が100%ありますよ。' }
        ]
      },
      q_fatigue: {
        step: 2,
        speaker: 'アロマアシスタント',
        text: `身体がクタクタになるまで動いていらっしゃったのですね。お疲れ様です。今、特にどの部分に重荷を感じていますか？`,
        choices: [
          { id: 'fatigue_heavy', num: '1', label: '🏃‍♂️ 長時間の立ち仕事、移動、外出の繰り返しで身体全体が重い', nextAroma: 'lemongrass', reply: '身体の疲れですね。頑張ってご自身の身体を働かせた証拠です。本当にお疲れ様です。' },
          { id: 'fatigue_rhythm', num: '2', label: '🌙 夜型の生活や不規則な就寝・起床で、生活リズムが崩れてだるい', nextAroma: 'clarysage', reply: '生活リズムの崩れですね。自律神経や体調リズムが乱れると、なんとなくずっと重だるさが消えませんよね。' },
          { id: 'fatigue_body', num: '3', label: '💻 パソコンやスマホの画面を凝視しすぎて、目と頭が重い', nextAroma: 'eucalyptus', reply: 'デスクワークによる頭の疲れですね。ブルーライトを浴びすぎて脳内がパンパンになっていますね。' }
        ]
      },
      q_motivation: {
        step: 2,
        speaker: 'アロマアシスタント',
        text: `机に向かってもどうしても別の作業に逃げてしまって、自己嫌悪になったりしますよね。でも、それは脳のエネルギーが一時的に空っぽなだけなんです。自分を責めないでくださいね。\n\nアロマの香りで、ここからどのような状態に意識をチェンジさせたいですか？`,
        choices: [
          { id: 'mot_focus', num: '1', label: '🎯 スマホの通知など、周りの雑音を消して目の前のタスクに没頭したい', nextAroma: 'peppermint', reply: '目の前の集中ですね。余計なノイズをシャットアウトして、一気に片付けてしまいましょう！' },
          { id: 'mot_wakeup', num: '2', label: '☀️ 朝早く活動したいときや、仕事はじめの眠気を吹き飛ばしてスッキリしたい', nextAroma: 'lemon', reply: '朝のスッキリ覚醒ですね。どんよりした脳に刺激を与えて、クリアな思考を呼び戻しましょう。' },
          { id: 'mot_fresh', num: '3', label: '🍃 ずっと同じ部屋にこもっていて息が詰まるので、空間の雰囲気を変えたい', nextAroma: 'citronella', reply: 'どんよりした空気の浄化ですね。窓をガラッと開けて、新しい風を入れ込むように香りで満たしましょう。' }
        ]
      },
      q_sleep: {
        step: 2,
        speaker: 'アロマアシスタント',
        text: `布団に入っても目が冴えてしまうのは非常につらいですよね。スパイラルを香りで優しく断ち切りましょう。眠れない最大の原因はどれに近いですか？`,
        choices: [
          { id: 'sleep_thinking', num: '1', label: '💭 今日あった出来事の反省や、明日以降の心配事で頭がぐるぐる動き続ける', nextAroma: 'lavender', reply: 'ぐるぐる思考の不安ですね。今考えても仕方がないことは、香りのヴェールに預けて脳をオフにしましょう。' },
          { id: 'sleep_noise', num: '2', label: '📱 デジタルによる脳の興奮。脳内の情報ノイズをウッディな香りでリセットしたい', nextAroma: 'sandalwood', reply: 'デジタルによる脳の興奮ですね。脳内の情報ノイズを、ウッディな静寂の香りでリセットしましょう。' },
          { id: 'sleep_hormone', num: '3', label: '❄️ 心がざわざわして身体の芯の冷えやイライラがあり、落ち着いて眠れない', nextAroma: 'clarysage', reply: '焦りや体調リズムの乱れですね。芯から心と身体の緊張をゆるめ、温かい休息にいざないましょう。' }
        ]
      },
      step3_question: {
        step: 3,
        speaker: 'アロマアシスタント',
        text: `教えてくれてありがとうございます。あなたの日常や心の状況、しっかり伝わってきました。\n\n本当によく、これまで一人でその気持ちに折り合いをつけて頑張ってきましたね。偉いですよ。もう無理に気張らなくても大丈夫。\n\n最後に、今日のあなたが「こうなれたら一番心が軽くなるな」と感じる理想の状態を教えてください。`,
        choices: [
          { id: 'want_calm', num: '1', label: '🕊️ 焦りから解放され、深く穏やかに落ち着きたい', offset: 'calm' },
          { id: 'want_refresh', num: '2', label: '🍃 淀んだ気分を吹き飛ばし、明るく前向きに切り替えたい', offset: 'refresh' },
          { id: 'want_heal', num: '3', label: '💖 やさしく愛あるハグに包まれたように、幸福感で満たされたい', offset: 'heal' }
        ]
      }
    };

    // --- 状態管理 (State) ---
    let activeTab = 'diagnose';
    let currentNode = 'start';
    let history = [];
    let selectedKey = null;
    let isTyping = false;
    let favorites = [];
    let libraryFilter = 'すべて';
    let diagnoseState = {
      category: null,
      detail: null,
      desired: null,
      tempAroma: null,
      freeTextAnswer: ''
    };

    // Googleドライブ直リンク生成ヘルパー
    const getGoogleDriveDirectLink = (url) => {
      if (!url) return '';
      let id = '';
      if (url.includes('id=')) {
        const match = url.match(/id=([^&]+)/);
        if (match) id = match[1];
      } else if (url.includes('/d/')) {
        const parts = url.split('/d/');
        if (parts[1]) {
          id = parts[1].split('/')[0];
        }
      }
      return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
    };

    // --- 初期ロード処理 ---
    window.onload = () => {
      initApp();
    };

    const initApp = () => {
      // 履歴初期化
      history = [
        {
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: '🌿 ようこそ、アロマアシスタント へ。\n当サービスは、植物のやさしい香りを通じて、毎日を一生懸命に生きるあなたの心と身体にそっと寄り添うアロマ提案プログラムです。'
        },
        {
          type: 'bot',
          speaker: '注意事項',
          text: '⚠️ 【ご利用の前に】\n当サービスはセルフケアとしてのリラクゼーションを提案するものであり、医療行為や医学的な診断・治療に代わるものではありません。'
        }
      ];
      renderChat();
      triggerBotQuestion('start', 1000);
      renderLibrary();
      updateFavoriteBadge();
    };

    // --- タブ切り替え ---
    const switchTab = (tabId) => {
      activeTab = tabId;
      const tabs = ['diagnose', 'library', 'favorites'];
      
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        const content = document.getElementById(`content-${t}`);
        if (t === tabId) {
          btn.className = "flex-1 py-3 text-center transition-all border-b-2 flex items-center justify-center gap-1.5 border-emerald-600 text-emerald-800 font-bold bg-emerald-50/20";
          content.classList.remove('hidden');
        } else {
          btn.className = "flex-1 py-3 text-center transition-all border-b-2 flex items-center justify-center gap-1.5 border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50/50";
          content.classList.add('hidden');
        }
      });

      if (tabId === 'library') {
        renderLibrary();
      } else if (tabId === 'favorites') {
        renderFavorites();
      }
      scrollToBottom();
    };

    // --- チャットのレンダリング ---
    const renderChat = () => {
      const container = document.getElementById('chat-history');
      container.innerHTML = '';

      history.forEach(msg => {
        const isUser = msg.type === 'user';
        const isWarn = msg.speaker === '注意事項';
        
        const wrapper = document.createElement('div');
        wrapper.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'} animate-fade-in`;

        // 署名ラベル
        const label = document.createElement('span');
        label.className = `text-[10px] font-bold mb-1 ${isUser ? 'pr-2 text-slate-400' : 'pl-2 text-emerald-800 flex items-center gap-1'}`;
        label.innerHTML = isUser ? '👤 あなた' : `${isWarn ? '⚠️' : '🍃'} ${msg.speaker}`;
        wrapper.appendChild(label);

        // メッセージ吹き出し
        const bubble = document.createElement('div');
        bubble.className = `max-w-[88%] p-3.5 rounded-2xl text-[13.5px] leading-relaxed shadow-sm transition-all whitespace-pre-line ${
          isUser
            ? 'bg-emerald-700 text-white rounded-tr-none shadow-emerald-700/10 font-medium'
            : isWarn
            ? 'bg-amber-50 text-amber-900 border border-amber-200/60 rounded-tl-none text-xs font-semibold'
            : 'bg-white text-slate-800 border border-emerald-100/50 rounded-tl-none shadow-slate-100 font-medium'
        }`;
        bubble.textContent = msg.text;
        wrapper.appendChild(bubble);

        container.appendChild(wrapper);
      });

      // タイピングインジケータ
      if (isTyping) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = `flex flex-col items-start`;
        typingWrapper.innerHTML = `
          <span class="text-[10px] text-emerald-800 font-bold mb-1 pl-2 flex items-center gap-1">🍃 アロマアシスタントが考え中...</span>
          <div class="bg-white border border-emerald-100/50 rounded-2xl rounded-tl-none p-3 shadow-sm flex space-x-1.5 items-center">
            <span class="block w-2 h-2 bg-emerald-600 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
            <span class="block w-2 h-2 bg-emerald-600 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
            <span class="block w-2 h-2 bg-emerald-600 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
          </div>
        `;
        container.appendChild(typingWrapper);
      }

      // 結果画面の描画
      if (selectedKey && AROMA_DATA[selectedKey] && currentNode === 'result') {
        renderResultCard(container);
      }

      scrollToBottom();
    };

    // --- 結果カードの生成 ---
    const renderResultCard = (container) => {
      const aroma = AROMA_DATA[selectedKey];
      const isFav = favorites.includes(selectedKey);

      const card = document.createElement('div');
      card.className = "mt-4 bg-white border border-emerald-100 rounded-2xl p-5 shadow-md space-y-4 animate-fade-in";
      card.innerHTML = `
        <div class="p-4 rounded-xl bg-gradient-to-br ${aroma.color} text-white relative overflow-hidden shadow-inner">
          <div class="absolute right-2 -bottom-2 text-7xl opacity-20">${aroma.emoji}</div>
          <div class="text-xs font-bold uppercase tracking-widest opacity-80">${aroma.english}</div>
          <h3 class="text-2xl font-black mt-1 flex items-center gap-2">
            <span>${aroma.emoji}</span>
            <span>${aroma.name}</span>
          </h3>
          <p class="text-xs bg-white/20 px-2 py-0.5 rounded-full inline-block mt-2 font-semibold">
            ${aroma.category}
          </p>
        </div>

        <div class="relative rounded-xl overflow-hidden bg-slate-100 aspect-video group">
          <img
            src="${getGoogleDriveDirectLink(aroma.image)}"
            alt="${aroma.name}"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
            onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1540555700478-4be289fbecef?auto=format&fit=crop&w=600&q=80';"
          />
          <div class="absolute top-2 right-2">
            <button
              onclick="toggleFavorite('${selectedKey}')"
              class="w-10 h-10 rounded-full flex items-center justify-center shadow-md transition-all ${
                isFav ? 'bg-rose-500 text-white' : 'bg-white text-slate-400 hover:text-rose-500'
              }"
            >
              ❤️
            </button>
          </div>
        </div>

        <div class="space-y-3 text-slate-700">
          <div>
            <span class="text-xs text-slate-400 font-bold block mb-1">🌿 この香りの特徴</span>
            <p class="text-sm leading-relaxed bg-slate-50 p-3 rounded-lg border border-slate-100 font-medium">${aroma.desc}</p>
          </div>

          <div>
            <span class="text-xs text-slate-400 font-bold block mb-1">📋 こんな悩みをお持ちのあなたへ</span>
            <p class="text-xs leading-relaxed text-slate-600 bg-red-50/50 p-2 rounded border border-red-100/50">
              ${aroma.trouble}
            </p>
          </div>

          <div>
            <span class="text-xs text-slate-400 font-bold block mb-1">🌟 期待できるアロマ効果</span>
            <div id="result-props" class="flex flex-wrap gap-1.5 mt-1"></div>
          </div>

          <div>
            <span class="text-xs text-slate-400 font-bold block mb-1">⏰ おすすめのシーン</span>
            <ul id="result-scenes" class="text-xs text-slate-600 list-disc list-inside space-y-1"></ul>
          </div>

          <div class="border-t border-slate-100 pt-3">
            <span class="text-xs text-slate-400 font-bold block mb-1">💡 アロマアシスタントからのアドバイス</span>
            <p class="text-[11px] leading-relaxed text-slate-500 bg-slate-50 p-3 rounded-lg italic">
              ${aroma.reference}
            </p>
          </div>
        </div>

        <button
          onclick="resetDiagnosis()"
          class="w-full mt-2 py-3 bg-emerald-800 text-white font-bold rounded-xl shadow-md hover:bg-emerald-950 transition active:scale-[0.98] text-xs"
        >
          🔄 別の気分で診断する / 最初に戻る
        </button>
      `;

      container.appendChild(card);

      // 動的データの充填
      const propsContainer = card.querySelector('#result-props');
      aroma.properties.forEach(prop => {
        const span = document.createElement('span');
        span.className = "bg-emerald-50 text-emerald-800 text-[10px] px-2.5 py-1 rounded-full font-bold border border-emerald-100";
        span.textContent = `#${prop}`;
        propsContainer.appendChild(span);
      });

      const scenesContainer = card.querySelector('#result-scenes');
      aroma.scenes.forEach(scene => {
        const li = document.createElement('li');
        li.className = "leading-relaxed";
        li.textContent = scene;
        scenesContainer.appendChild(li);
      });
    };

    // --- ボット返答アクション ---
    const triggerBotQuestion = (nodeKey, delay = 1000) => {
      isTyping = true;
      renderChat();
      
      setTimeout(() => {
        isTyping = false;
        const node = ADVISOR_FLOW[nodeKey];
        if (node) {
          history.push({ type: 'bot', speaker: node.speaker, text: node.text });
          currentNode = nodeKey;
        }
        renderChat();
        renderActionPanel();
      }, delay);
    };

    // --- ボタン・入力フォーム（アクションパネル） ---
    const renderActionPanel = () => {
      const panel = document.getElementById('action-panel');
      panel.innerHTML = '';

      if (currentNode === 'result' || isTyping) return;

      if (currentNode === 'free_input') {
        // 自由入力フォーム
        panel.innerHTML = `
          <div class="bg-white p-4 rounded-2xl border border-emerald-100 shadow-md space-y-3 animate-slide-up">
            <div class="flex justify-between items-center">
              <span class="text-xs text-slate-500 font-bold">📋 お悩みを直接話す</span>
              <button onclick="resetDiagnosis()" class="text-xs text-red-500 hover:text-red-700 font-medium">リセット</button>
            </div>
            <textarea
              id="free-textarea"
              placeholder="例：最近、仕事のプレッシャーや忙しさで、夜も焦ってしまってなかなか眠りにつくことができません…"
              class="w-full p-3 rounded-xl border border-slate-200 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-none h-24 text-slate-700 leading-relaxed"
            ></textarea>
            <div class="flex gap-2">
              <button
                onclick="submitFreeText()"
                class="flex-1 bg-emerald-800 hover:bg-emerald-900 text-white py-2.5 rounded-xl text-xs font-bold transition shadow-md active:scale-95"
              >
                アシスタントに相談を届ける
              </button>
              <button
                onclick="cancelFreeInput()"
                class="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition"
              >
                キャンセル
              </button>
            </div>
          </div>
        `;
        return;
      }

      const node = ADVISOR_FLOW[currentNode];
      if (!node) return;

      const choicesWrapper = document.createElement('div');
      choicesWrapper.className = "space-y-3 animate-slide-up";

      // 選択肢ボタン
      const btnGrid = document.createElement('div');
      btnGrid.className = "grid grid-cols-1 gap-2 pr-1";

      node.choices.forEach(item => {
        const btn = document.createElement('button');
        btn.className = "text-left p-3.5 rounded-2xl border border-slate-200 bg-white hover:border-emerald-600 hover:bg-emerald-50/20 text-slate-700 hover:text-emerald-950 font-semibold text-xs transition-all active:scale-[0.98] shadow-sm flex items-center justify-between group";
        btn.onclick = () => handleChoiceSelect(item.id, item.label, item.reply, item.nextAroma);
        btn.innerHTML = `
          <span class="group-hover:translate-x-0.5 transition-transform leading-relaxed">${item.label}</span>
          <span class="text-[10px] text-slate-300 group-hover:text-emerald-600 shrink-0 ml-1">➜</span>
        `;
        btnGrid.appendChild(btn);
      });
      choicesWrapper.appendChild(btnGrid);

      // 「その他（自由記述）」ボタン
      if (currentNode === 'start') {
        const otherBtn = document.createElement('button');
        otherBtn.className = "w-full p-3.5 rounded-2xl border-2 border-dashed border-emerald-300 bg-emerald-50/40 hover:bg-emerald-50/80 text-emerald-800 hover:text-emerald-950 font-bold text-xs transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-1.5";
        otherBtn.onclick = () => handleChoiceSelect('q_other', '📝 自由に相談する（自由記述）');
        otherBtn.innerHTML = `<span>✍️ 自由に言葉でアシスタントに相談する（自由記述）</span>`;
        choicesWrapper.appendChild(otherBtn);
      }

      // 簡易送信フォーム
      const form = document.createElement('div');
      form.className = "flex gap-2 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm";
      form.innerHTML = `
        <input
          id="number-input"
          type="text"
          placeholder="番号を入力して送信もできます"
          class="flex-1 bg-transparent px-3 py-1.5 text-xs focus:outline-none"
          onkeydown="if(event.key === 'Enter') submitFormInput()"
        />
        <button
          onclick="submitFormInput()"
          class="bg-emerald-800 text-white px-4 py-1.5 rounded-xl text-xs font-bold hover:bg-emerald-900 transition shadow"
        >
          送信
        </button>
      `;
      choicesWrapper.appendChild(form);

      panel.appendChild(choicesWrapper);
    };

    // --- 選択肢クリック処理 ---
    const handleChoiceSelect = (choiceId, label, replyText = '', nextAroma = null) => {
      history.push({ type: 'user', text: label, speaker: 'あなた' });
      isTyping = true;
      renderChat();

      setTimeout(() => {
        isTyping = false;

        if (currentNode === 'start') {
          if (choiceId === 'q_other') {
            history.push({ type: 'bot', speaker: 'アロマアシスタント', text: '日々のお悩みや、こうなりたいという思いを、自由にここに綴ってみてくださいね。アロマアシスタントがしっかり受け止めます。' });
            diagnoseState.category = 'free';
            currentNode = 'free_input';
          } else {
            if (replyText) {
              history.push({ type: 'bot', speaker: 'アロマアシスタント', text: `${replyText}\nもう少し詳しく教えていただけますか？🌿` });
            }
            diagnoseState.category = choiceId;
            currentNode = choiceId;
          }
        } 
        else if (['q_stress', 'q_anxiety', 'q_fatigue', 'q_motivation', 'q_sleep'].includes(currentNode)) {
          if (replyText) {
            history.push({ type: 'bot', speaker: 'アロマアシスタント', text: replyText });
          }
          diagnoseState.detail = choiceId;
          diagnoseState.tempAroma = nextAroma || 'lavender';
          currentNode = 'step3_question';
        }
        else if (currentNode === 'step3_question') {
          diagnoseState.desired = choiceId;
          history.push({ type: 'bot', speaker: 'アロマアシスタント', text: '教えてくれてありがとうございました。\n\n理想の気分に合わせた「とっておきの香り」を調香いたしました。どうぞ受け取ってください…🌿✨' });
          
          isTyping = true;
          renderChat();
          setTimeout(() => {
            isTyping = false;
            let matchedAroma = diagnoseState.tempAroma || 'lavender';
            
            // 補正ロジック
            if (choiceId === 'want_calm' && (matchedAroma === 'peppermint' || matchedAroma === 'lemon')) {
              matchedAroma = 'lavender';
            } else if (choiceId === 'want_heal' && matchedAroma === 'citronella') {
              matchedAroma = 'rose';
            }
            
            selectedKey = matchedAroma;
            currentNode = 'result';
            renderChat();
            renderActionPanel();
          }, 1500);
          return;
        }

        renderChat();
        renderActionPanel();
      }, 800);
    };

    // --- 自由記述フォーム送信 ---
    const submitFreeText = () => {
      const textarea = document.getElementById('free-textarea');
      const text = textarea.value.trim();
      if (!text) return;

      history.push({ type: 'user', text: text, speaker: 'あなた' });
      isTyping = true;
      renderChat();
      renderActionPanel();

      setTimeout(() => {
        isTyping = false;
        const matchedKey = detectAromaFromText(text);
        history.push({ type: 'bot', speaker: 'アロマアシスタント', text: `言葉にしていただき、ありがとうございます。これだけでも、脳の重荷が軽くなりますよ。本当に毎日頑張っていますね。\n\nお悩みから、今のあなたを優しく包む最適な香りを導き出しました。どうぞ参考に。🍃` });
        
        isTyping = true;
        renderChat();
        setTimeout(() => {
          isTyping = false;
          selectedKey = matchedKey;
          diagnoseState.freeTextAnswer = text;
          diagnoseState.tempAroma = matchedKey;
          currentNode = 'result';
          renderChat();
          renderActionPanel();
        }, 1500);
      }, 1200);
    };

    const cancelFreeInput = () => {
      currentNode = 'start';
      history.push({ type: 'bot', speaker: 'アロマアシスタント', text: 'かしこまりました。最初の選択肢からお選びくださいね。🌿' });
      renderChat();
      renderActionPanel();
    };

    // キーワードマッチングによるアロマ自動選択
    const detectAromaFromText = (text) => {
      const t = text.toLowerCase();
      if (t.includes('ストレス') || t.includes('不安') || t.includes('イライラ') || t.includes('焦') || t.includes('落ち着き') || t.includes('リラックス') || t.includes('プレッシャー') || t.includes('締め切り') || t.includes('レポート') || t.includes('発表') || t.includes('試験') || t.includes('仕事') || t.includes('会社') || t.includes('タスク')) return 'lavender';
      if (t.includes('落ち込') || t.includes('前向き') || t.includes('ふさぎ') || t.includes('もやもや') || t.includes('沈み') || t.includes('静寂') || t.includes('人間関係') || t.includes('サークル') || t.includes('バイト') || t.includes('sns') || t.includes('ツイッター') || t.includes('インスタ') || t.includes('対人')) return 'bergamot';
      if (t.includes('集中') || t.includes('眠気') || t.includes('勉強') || t.includes('作業') || t.includes('気が散') || t.includes('テスト') || t.includes('パソコン') || t.includes('徹夜') || t.includes('運転')) return 'peppermint';
      if (t.includes('疲れ') || t.includes('だる') || t.includes('疲労') || t.includes('元気') || t.includes('活動') || t.includes('限界') || t.includes('立ち仕事') || t.includes('家事') || t.includes('クタクタ')) return 'lemongrass';
      if (t.includes('朝') || t.includes('目覚め') || t.includes('起き') || t.includes('シャキッと') || t.includes('起床') || t.includes('二度寝')) return 'lemon';
      if (t.includes('緊張') || t.includes('ドキドキ') || t.includes('プレゼン') || t.includes('商談') || t.includes('面接') || t.includes('就活') || t.includes('人前') || t.includes('本番')) return 'geranium';
      if (t.includes('女性') || t.includes('生理') || t.includes('リズム') || t.includes('穏やか') || t.includes('波') || t.includes('pms') || t.includes('月経') || t.includes('体調')) return 'clarysage';
      if (t.includes('空気') || t.includes('清潔') || t.includes('消臭') || t.includes('部屋') || t.includes('におい') || t.includes('すっきりさせ') || t.includes('片付け') || t.includes('散らか') || t.includes('お掃除')) return 'teatree';
      if (t.includes('鼻') || t.includes('のど') || t.includes('不快') || t.includes('風邪') || t.includes('呼吸') || t.includes('花粉') || t.includes('つらい') || t.includes('鼻づまり') || t.includes('エアコン') || t.includes('乾燥')) return 'eucalyptus';
      if (t.includes('虫') || t.includes('蚊') || t.includes('アウトドア') || t.includes('キャンプ') || t.includes('野外') || t.includes('合宿') || t.includes('バーベキュー') || t.includes('湿気')) return 'citronella';
      if (t.includes('雑念') || t.includes('瞑想') || t.includes('ヨガ') || t.includes('マインドフルネス') || t.includes('お香') || t.includes('デジタルデトックス') || t.includes('読書') || t.includes('本')) return 'sandalwood';
      if (t.includes('自信') || t.includes('幸福') || t.includes('贅沢') || t.includes('自己肯定') || t.includes('高揚') || t.includes('美') || t.includes('ご褒美') || t.includes('愛し') || t.includes('ハグ')) return 'rose';
      return 'lavender';
    };

    // 簡易入力フォーム送信（番号選択）
    const submitFormInput = () => {
      const input = document.getElementById('number-input');
      const val = input.value.trim();
      if (!val) return;

      const node = ADVISOR_FLOW[currentNode];
      if (!node) return;

      const found = node.choices.find(choice => {
        return val === choice.num || val.includes(choice.num) || choice.label.includes(val);
      });

      input.value = '';
      if (found) {
        handleChoiceSelect(found.id, found.label, found.reply, found.nextAroma);
      } else {
        history.push({ type: 'user', text: val, speaker: 'あなた' });
        isTyping = true;
        renderChat();
        setTimeout(() => {
          isTyping = false;
          history.push({ type: 'bot', speaker: 'アロマアシスタント', text: '提示されている選択肢の番号を入力して送信するか、ボタンを直接タップしてくださいね。' });
          renderChat();
          renderActionPanel();
        }, 600);
      }
    };

    // --- 診断のリセット ---
    const resetDiagnosis = () => {
      history = [
        {
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: 'おかえりなさい🌿 またお話しできて嬉しいです。今のあなたの調子はどうですか？\n\n力を抜いて、気になるものを選んで教えてくださいね。'
        }
      ];
      selectedKey = null;
      isTyping = false;
      currentNode = 'start';
      diagnoseState = {
        category: null,
        detail: null,
        desired: null,
        tempAroma: null,
        freeTextAnswer: ''
      };
      
      renderChat();
      triggerBotQuestion('start', 800);
    };

    // --- お気に入り管理 ---
    const toggleFavorite = (key) => {
      if (favorites.includes(key)) {
        favorites = favorites.filter(k => k !== key);
      } else {
        favorites.push(key);
      }
      updateFavoriteBadge();
      if (activeTab === 'library') renderLibrary();
      if (activeTab === 'favorites') renderFavorites();
      if (activeTab === 'diagnose') renderChat();
    };

    const updateFavoriteBadge = () => {
      const badge = document.getElementById('fav-badge');
      if (favorites.length > 0) {
        badge.textContent = favorites.length;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    };

    // --- Tab 2: アロマ図鑑レンダリング ---
    const renderLibrary = () => {
      const filterBar = document.getElementById('library-filter-bar');
      const listContainer = document.getElementById('library-list');

      // カテゴリ一覧
      const categories = ['すべて', ...new Set(Object.values(AROMA_DATA).map(a => a.category))];
      
      // フィルターバナを描画
      filterBar.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat;
        btn.className = `px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all border ${
          libraryFilter === cat
            ? 'bg-emerald-800 text-white border-emerald-800 shadow-sm'
            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'
        }`;
        btn.onclick = () => {
          libraryFilter = cat;
          renderLibrary();
        };
        filterBar.appendChild(btn);
      });

      // アロマリストを描画
      listContainer.innerHTML = '';
      Object.keys(AROMA_DATA)
        .filter(key => libraryFilter === 'すべて' || AROMA_DATA[key].category === libraryFilter)
        .forEach(key => {
          const aroma = AROMA_DATA[key];
          const isFav = favorites.includes(key);

          const item = document.createElement('div');
          item.className = "bg-white rounded-2xl p-4 border border-slate-100 shadow-sm flex flex-col gap-3 relative hover:shadow-md transition animate-fade-in";
          item.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${aroma.english}</div>
                <h4 class="text-base font-extrabold text-slate-800 flex items-center gap-1 mt-0.5">
                  <span>${aroma.emoji}</span>
                  <span>${aroma.name}</span>
                </h4>
              </div>
              <button
                onclick="toggleFavorite('${key}')"
                class="w-8 h-8 rounded-full flex items-center justify-center transition-all ${
                  isFav ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-400 hover:text-rose-500'
                }"
              >
                ❤️
              </button>
            </div>

            <div class="flex gap-3">
              <div class="w-20 h-20 rounded-xl overflow-hidden bg-slate-100 shrink-0">
                <img
                  src="${getGoogleDriveDirectLink(aroma.image)}"
                  alt="${aroma.name}"
                  class="w-full h-full object-cover"
                  onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1540555700478-4be289fbecef?auto=format&fit=crop&w=300&q=80';"
                />
              </div>
              <div class="flex-1 flex flex-col justify-between">
                <p class="text-xs text-slate-600 line-clamp-3 leading-relaxed">
                  ${aroma.desc}
                </p>
                <div class="flex flex-wrap gap-1 mt-1 font-props">
                  <!-- JS動的挿入 -->
                </div>
              </div>
            </div>

            <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 text-[10px] leading-relaxed text-slate-500 italic">
              ${aroma.reference}
            </div>
          `;

          // タグ
          const propsBox = item.querySelector('.font-props');
          aroma.properties.slice(0, 2).forEach(prop => {
            const span = document.createElement('span');
            span.className = "bg-slate-50 text-[9px] px-1.5 py-0.5 rounded border border-slate-100 font-semibold text-slate-500";
            span.textContent = `#${prop}`;
            propsBox.appendChild(span);
          });

          listContainer.appendChild(item);
        });
    };

    // --- Tab 3: お気に入り画面レンダリング ---
    const renderFavorites = () => {
      const favList = document.getElementById('favorites-list');
      favList.innerHTML = '';

      if (favorites.length === 0) {
        favList.innerHTML = `
          <div class="text-center py-20 px-4 space-y-4 my-auto flex flex-col items-center justify-center animate-fade-in">
            <span class="text-5xl block animate-pulse">🌿</span>
            <h3 class="text-sm font-bold text-slate-600">お気に入りはまだありません</h3>
            <p class="text-xs text-slate-400 leading-relaxed max-w-[280px] mx-auto">
              対話で提案されたアロマや、図鑑で見つけたお気に入りのアロマのハートマークを押して保存してみましょう。
            </p>
          </div>
        `;
        return;
      }

      favorites.forEach(key => {
        const aroma = AROMA_DATA[key];
        if (!aroma) return;

        const item = document.createElement('div');
        item.className = "bg-white rounded-2xl p-4 border border-slate-100 shadow-sm flex gap-3 relative hover:shadow-md transition animate-fade-in";
        item.innerHTML = `
          <div class="w-16 h-16 rounded-xl overflow-hidden bg-slate-100 shrink-0">
            <img
              src="${getGoogleDriveDirectLink(aroma.image)}"
              alt="${aroma.name}"
              class="w-full h-full object-cover"
              onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1540555700478-4be289fbecef?auto=format&fit=crop&w=300&q=80';"
            />
          </div>
          <div class="flex-1 flex flex-col justify-between">
            <div>
              <div class="text-[9px] text-slate-400 font-bold uppercase">${aroma.english}</div>
              <h4 class="text-sm font-extrabold text-slate-800 flex items-center gap-1 mt-0.5">
                <span>${aroma.emoji}</span>
                <span>${aroma.name}</span>
              </h4>
            </div>
            <p class="text-[11px] text-slate-500 line-clamp-2 leading-relaxed">
              ${aroma.desc}
            </p>
          </div>
          <button
            onclick="toggleFavorite('${key}')"
            class="text-rose-500 hover:text-slate-300 transition-colors p-1"
          >
            ❤️
          </button>
        `;
        favList.appendChild(item);
      });
    };

    // 画面全体のスムーズスクロール
    const scrollToBottom = () => {
      setTimeout(() => {
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: 'smooth'
        });
      }, 50);
    };
  </script>
</body>
</html>
