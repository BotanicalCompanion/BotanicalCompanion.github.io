      }

      // 【ステップ4: 診断結果表示済み】
      else if (currentStepNum === 4) {
        panel.innerHTML = '';
      }

      // 操作パネル描画後にスクロール位置を調整
      scrollToBottom();
    };

    // --- 各選択アクション ---

    // ステップ1：主訴
    const selectStep1 = (chId, label, replyText) => {
      chatHistory.push({ type: 'user', text: label });
      step1SelectedId = chId;
      currentStepNum = 2;
      renderChat();
      renderActionPanel();

      isTyping = true;
      renderChat();
      setTimeout(() => {
        isTyping = false;
        chatHistory.push({
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: replyText + `\n\n` + DIAGNOSE_STEPS.step2_data[chId].text
        });
        renderChat();
        renderActionPanel();
      }, 1000);
    };

    // 自由記述開始
    const openFreeInput = () => {
      currentStepNum = 'free_input';
      renderActionPanel();
    };

    // 自由記述キャンセル
    const cancelFreeInput = () => {
      currentStepNum = 1;
      renderActionPanel();
    };

    // 自由記述送信
    const submitFreeText = () => {
      const textarea = document.getElementById('free-textarea');
      const text = textarea ? textarea.value.trim() : '';
      if (!text) return;

      chatHistory.push({ type: 'user', text: text });
      
      let matchedAroma = 'lavender';
      const textLower = text.toLowerCase();

      if (textLower.includes('ストレス') || textLower.includes('人間関係') || textLower.includes('疲れた') || textLower.includes('sns') || textLower.includes('もやもや')) {
        matchedAroma = 'bergamot';
      }
      if (textLower.includes('眠れ') || textLower.includes('寝') || textLower.includes('起き') || textLower.includes('夜')) {
        matchedAroma = 'lavender';
      }
      if (textLower.includes('仕事') || textLower.includes('集中') || textLower.includes('眠気') || textLower.includes('パソコン')) {
        matchedAroma = 'peppermint';
      }
      if (textLower.includes('頭') || textLower.includes('のど') || textLower.includes('エアコン') || textLower.includes('乾燥')) {
        matchedAroma = 'eucalyptus';
      }
      if (textLower.includes('身体') || textLower.includes('筋肉') || textLower.includes('疲れ') || textLower.includes('重い')) {
        matchedAroma = 'lemongrass';
      }
      if (textLower.includes('女性') || textLower.includes('不安定') || textLower.includes('情緒') || textLower.includes('生理')) {
        matchedAroma = 'clarysage';
      }

      provisionalAroma = matchedAroma;
      currentStepNum = 3;
      renderChat();
      renderActionPanel();

      isTyping = true;
      renderChat();
      setTimeout(() => {
        isTyping = false;
        chatHistory.push({
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: `お話を聞かせていただき、ありがとうございます。あなたのお悩みにそっと寄り添えるよう、心の琴線に触れる香りを調香いたします。\n\n最後に、理想のイメージを教えてください。`
        });
        chatHistory.push({
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: DIAGNOSE_STEPS.step3.text
        });
        renderChat();
        renderActionPanel();
      }, 1200);
    };

    // ステップ2：原因の選択
    const selectStep2 = (aromaId, label, replyText) => {
      chatHistory.push({ type: 'user', text: label });
      provisionalAroma = aromaId;
      currentStepNum = 3;
      renderChat();
      renderActionPanel();

      isTyping = true;
      renderChat();
      setTimeout(() => {
        isTyping = false;
        chatHistory.push({
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: replyText
        });
        chatHistory.push({
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: DIAGNOSE_STEPS.step3.text
        });
        renderChat();
        renderActionPanel();
      }, 1000);
    };

    // ステップ3：理想の状態の選択（これで確定）
    const selectStep3 = (idealId, label) => {
      chatHistory.push({ type: 'user', text: label });
      step3SelectedIdeal = idealId;
      currentStepNum = 4;
      renderChat();
      renderActionPanel();

      isTyping = true;
      renderChat();
      setTimeout(() => {
        isTyping = false;
        
        const finalAromaId = DECISION_MATRIX[provisionalAroma]?.[idealId] || provisionalAroma;
        const aroma = AROMA_DATA[finalAromaId];

        chatHistory.push({
          type: 'bot',
          speaker: 'アロマアシスタント',
          text: `すべての想いを教えていただき、本当にありがとうございました。大変長らくお待たせいたしました。\n\n今のあなたに寄り添うアロマは、心の深呼吸を導く「${aroma.name}」です。あなたの歩みをそっと応援します。`
        });
        renderChat();
        renderActionPanel();
      }, 1200);
    };

    // リセット
    const resetDiagnosis = () => {
      initChat();
    };

    // --- アロマ図鑑（Tab 2）の描画 ---
    const renderLibrary = () => {
      const filterBar = document.getElementById('library-filter-bar');
      const listContainer = document.getElementById('library-list');

      const categories = ['すべて', 'フローラル系', 'シトラス系', 'ミント系', 'ハーブ系', 'ウッディ系', 'ウッド系', 'ウッディ・ハーブ系', 'シトラス-ハーブ系'];
      filterBar.innerHTML = '';
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        const isActive = selectedFilterCategory === cat;
        btn.className = `px-3.5 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${
          isActive
            ? 'bg-emerald-800 text-white shadow-sm'
            : 'bg-white text-slate-600 hover:bg-emerald-50 border border-slate-100'
        }`;
        btn.textContent = cat;
        btn.onclick = () => {
          selectedFilterCategory = cat;
          renderLibrary();
        };
        filterBar.appendChild(btn);
      });

      listContainer.innerHTML = '';
      
      Object.keys(AROMA_DATA).forEach(key => {
        const aroma = AROMA_DATA[key];
        if (selectedFilterCategory !== 'すべて' && aroma.category !== selectedFilterCategory) {
          return;
        }

        const isFav = favorites.includes(key);

        const item = document.createElement('div');
        item.className = "bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition duration-300 flex flex-col";
        item.innerHTML = `
          <div class="relative h-32 w-full bg-slate-100">
            <img src="${aroma.imageUrl}" alt="${aroma.name}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/10 to-transparent"></div>
            <div class="absolute bottom-3 left-4 text-white">
              <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">${aroma.english}</span>
              <h4 class="text-lg font-black leading-none mt-0.5">${aroma.emoji} ${aroma.name}</h4>
            </div>
            <button
              onclick="toggleFavorite('${key}')"
              class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-white/95 text-slate-400 hover:text-rose-500 shadow transition-all ${
                isFav ? 'text-rose-500 bg-rose-50' : ''
              }"
            >
              ❤️
            </button>
          </div>
          <div class="p-4 space-y-3">
            <div class="flex justify-between items-center text-[11px]">
              <span class="bg-emerald-50 text-emerald-800 px-2.5 py-0.5 rounded-full font-bold border border-emerald-100">
                ${aroma.category}
              </span>
            </div>
            <p class="text-xs text-slate-600 leading-relaxed font-medium">${aroma.desc}</p>
            <div class="flex flex-wrap gap-1 pt-1">
              ${aroma.properties.map(p => `<span class="bg-slate-100 text-slate-600 text-[9px] px-2 py-0.5 rounded font-semibold"># ${p}</span>`).join('')}
            </div>
          </div>
        `;
        listContainer.appendChild(item);
      });
    };

    // --- お気に入り画面（Tab 3）の描画 ---
    const renderFavorites = () => {
      const container = document.getElementById('favorites-list');
      container.innerHTML = '';

      if (favorites.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 px-4 space-y-3">
            <div class="text-5xl">💚</div>
            <p class="text-sm font-bold text-slate-400">お気に入りのアロマはまだありません</p>
            <p class="text-xs text-slate-400 max-w-xs mx-auto leading-relaxed">
              対話診断結果やアロマ図鑑から、お気に入りの❤️をタップすると、ここにあなた好みの香りが保存されます。
            </p>
            <button
              onclick="switchTab('diagnose')"
              class="mt-4 px-5 py-2.5 bg-emerald-800 text-white text-xs font-bold rounded-xl shadow-md hover:bg-emerald-950 transition"
            >
              さっそく診断してみる
            </button>
          </div>
        `;
        return;
      }

      favorites.forEach(key => {
        const aroma = AROMA_DATA[key];
        if (!aroma) return;

        const item = document.createElement('div');
        item.className = "bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition duration-300 flex flex-col";
        item.innerHTML = `
          <div class="relative h-32 w-full bg-slate-100">
            <img src="${aroma.imageUrl}" alt="${aroma.name}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/10 to-transparent"></div>
            <div class="absolute bottom-3 left-4 text-white">
              <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">${aroma.english}</span>
              <h4 class="text-lg font-black leading-none mt-0.5">${aroma.emoji} ${aroma.name}</h4>
            </div>
            <button
              onclick="toggleFavorite('${key}')"
              class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-rose-500 text-white shadow transition-all hover:scale-105"
            >
              ❤️
            </button>
          </div>
          <div class="p-4 space-y-3">
            <div class="flex justify-between items-center text-[11px]">
              <span class="bg-emerald-50 text-emerald-800 px-2.5 py-0.5 rounded-full font-bold border border-emerald-100">
                ${aroma.category}
              </span>
            </div>
            <p class="text-xs text-slate-600 leading-relaxed font-medium">${aroma.desc}</p>
            <div class="flex flex-wrap gap-1 pt-1">
              ${aroma.properties.map(p => `<span class="bg-slate-100 text-slate-600 text-[9px] px-2 py-0.5 rounded font-semibold"># ${p}</span>`).join('')}
            </div>
          </div>
        `;
        container.appendChild(item);
      });
    };

    // お気に入りトグル処理
    const toggleFavorite = (aromaId) => {
      const idx = favorites.indexOf(aromaId);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(aromaId);
      }

      localStorage.setItem('botanical_companion_favs', JSON.stringify(favorites));
      updateFavoriteBadge();

      if (activeTab === 'library') {
        renderLibrary();
      } else if (activeTab === 'favorites') {
        renderFavorites();
      } else if (activeTab === 'diagnose') {
        renderChat();
      }
    };

    // お気に入りバッジ更新
    const updateFavoriteBadge = () => {
      const badge = document.getElementById('fav-badge');
      if (favorites.length > 0) {
        badge.textContent = favorites.length;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    };

    // --- 【完全修正】外枠の画面スクロールを引き起こさないための内部制御ロジック ---
    const scrollToBottom = () => {
      const container = document.getElementById('chat-scroll-container');
      if (!container) return;

      // scrollIntoView を使うと、iframe を貫通してメインブラウザ画面全体がスクロールしてしまうバグが発生します。
      // これを防ぐため、スクロール可能領域を検知し、コンテナ要素自体の scrollTop のみを滑らかに操作します。
      const scrollHeight = container.scrollHeight;
      const clientHeight = container.clientHeight;

      // メッセージの総高が表示領域（コンテナの高さ）を超えている場合のみスクロールする
      if (scrollHeight > clientHeight) {
        container.scrollTo({
          top: scrollHeight - clientHeight,
          behavior: 'smooth'
        });
      }
    };
  </script>
</body>
</html>
